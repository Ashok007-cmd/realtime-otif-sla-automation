name: Publish Docker image

on:
  workflow_dispatch:
    # Manual-trigger only, by design: this publishes a public Docker image
    # to ghcr.io. It intentionally does NOT run automatically on tag pushes
    # or GitHub releases — publishing is a deliberate, explicit action a
    # person takes by running this workflow, not an ongoing pipeline.
    inputs:
      version_tag:
        description: 'Version tag to publish alongside "latest" (e.g. v1.0.0)'
        required: false
        default: ''

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.event.inputs.version_tag }},enable=${{ github.event.inputs.version_tag != '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
